name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile generator
        run: python3 -m py_compile gen_readme.py
      - name: Check generated README
        run: python3 gen_readme.py --check
